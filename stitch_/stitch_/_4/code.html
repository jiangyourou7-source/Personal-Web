<!DOCTYPE html>

<html lang="zh"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>预约咨询与申请表单</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Work+Sans:wght@600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e2e2eb",
                        "on-error": "#ffffff",
                        "tertiary-container": "#8b2e01",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#434653",
                        "on-secondary-container": "#616363",
                        "secondary-container": "#dfe0e0",
                        "inverse-surface": "#2e3037",
                        "surface-bright": "#faf8ff",
                        "tertiary-fixed": "#ffdbcf",
                        "on-secondary-fixed": "#1a1c1c",
                        "on-error-container": "#93000a",
                        "on-background": "#191b22",
                        "tertiary-fixed-dim": "#ffb59a",
                        "on-secondary-fixed-variant": "#454747",
                        "inverse-primary": "#b1c5ff",
                        "error-container": "#ffdad6",
                        "on-surface": "#191b22",
                        "surface-container-high": "#e7e7f0",
                        "on-primary": "#ffffff",
                        "surface-tint": "#2559bd",
                        "surface-dim": "#d9d9e2",
                        "primary": "#00327d",
                        "primary-container": "#0047ab",
                        "outline-variant": "#c3c6d5",
                        "surface-container-low": "#f3f3fc",
                        "on-tertiary-container": "#ffaa8a",
                        "secondary-fixed": "#e2e2e2",
                        "primary-fixed": "#dae2ff",
                        "on-primary-container": "#a5bdff",
                        "on-tertiary-fixed-variant": "#802900",
                        "outline": "#737784",
                        "surface": "#faf8ff",
                        "on-tertiary-fixed": "#380d00",
                        "on-primary-fixed-variant": "#00419e",
                        "tertiary": "#651f00",
                        "primary-fixed-dim": "#b1c5ff",
                        "on-primary-fixed": "#001946",
                        "inverse-on-surface": "#f0f0f9",
                        "background": "#faf8ff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#e2e2eb",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#ededf6",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#c6c6c7",
                        "secondary": "#5d5f5f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "section-gap": "120px",
                        "element-gap": "24px",
                        "container-max": "1200px",
                        "margin": "auto",
                        "base": "8px",
                        "gutter": "32px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "headline-lg": ["Work Sans"],
                        "label-bold": ["Inter"],
                        "headline-md": ["Work Sans"],
                        "body-lg": ["Inter"],
                        "display-xl": ["Work Sans"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-lg": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "label-bold": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-md": ["32px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "body-lg": ["20px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "display-xl": ["72px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col">
<!-- TopNavBar -->
<header class="bg-surface-container-lowest sticky top-0 w-full z-50 border-b border-outline-variant">
<div class="flex justify-between items-center w-full px-8 py-6 max-w-[1200px] mx-auto">
<!-- Brand Logo -->
<div class="text-headline-md font-headline-md text-primary tracking-tighter">
                智造专家
            </div>
<!-- Navigation Links (Web) -->
<nav class="hidden md:flex gap-8 items-center">
<a class="font-label-bold text-label-bold text-on-surface-variant hover:text-primary transition-colors duration-200" href="#">
                    首页
                </a>
<a class="font-label-bold text-label-bold text-on-surface-variant hover:text-primary transition-colors duration-200" href="#">
                    深度文章
                </a>
<a class="font-label-bold text-label-bold text-on-surface-variant hover:text-primary transition-colors duration-200" href="#">
                    关于我
                </a>
<!-- Active Link -->
<a class="font-label-bold text-label-bold text-primary border-b-2 border-primary pb-1" href="#">
                    联系方式
                </a>
</nav>
<!-- Trailing Action -->
<div class="hidden md:block">
<button class="bg-surface-container-lowest text-primary border border-primary px-6 py-2 rounded font-label-bold text-label-bold hover:bg-surface-container-low transition-colors duration-200 active:scale-95">
                    立即诊断
                </button>
</div>
<!-- Mobile Menu Placeholder (Hidden on Web) -->
<div class="md:hidden text-primary">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center py-section-gap px-8">
<div class="w-full max-w-[1200px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-gutter items-center">
<!-- Hero Text Area (Left 5 Columns) -->
<div class="lg:col-span-5 flex flex-col gap-element-gap">
<h1 class="font-display-xl text-display-xl text-primary text-balance">
                    让我们聊聊您的软件方案。
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md">
                    通过专业诊断，消除系统瓶颈，构建高效可靠的工业级软件架构。请填写表单，我们将尽快与您联系。
                </p>
<div class="hidden lg:block w-16 h-1 bg-primary mt-8"></div>
</div>
<!-- Spacer -->
<div class="hidden lg:block lg:col-span-1"></div>
<!-- Form Area (Right 6 Columns) -->
<div class="lg:col-span-6 w-full">
<div class="bg-surface-container-lowest border border-outline-variant rounded p-8 md:p-12">
<form class="flex flex-col gap-6">
<!-- Name Field -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface" for="name">姓名</label>
<input class="w-full bg-surface-container-low border-0 border-b border-outline-variant focus:ring-0 focus:border-b-2 focus:border-primary text-body-md font-body-md text-on-surface px-4 py-3 transition-colors rounded-t" id="name" name="name" placeholder="您的全名" type="text"/>
</div>
<!-- Company Field -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface" for="company">公司名称</label>
<input class="w-full bg-surface-container-low border-0 border-b border-outline-variant focus:ring-0 focus:border-b-2 focus:border-primary text-body-md font-body-md text-on-surface px-4 py-3 transition-colors rounded-t" id="company" name="company" placeholder="您所在的企业" type="text"/>
</div>
<!-- Challenge Field -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-label-bold text-on-surface" for="challenge">您目前遇到的最大难题</label>
<textarea class="w-full bg-surface-container-low border-0 border-b border-outline-variant focus:ring-0 focus:border-b-2 focus:border-primary text-body-md font-body-md text-on-surface px-4 py-3 transition-colors resize-none rounded-t" id="challenge" name="challenge" placeholder="简述您面临的技术或业务痛点..." rows="4"></textarea>
</div>
<!-- Submit Button -->
<button class="mt-4 bg-primary text-on-primary font-label-bold text-label-bold py-4 px-8 rounded hover:bg-primary-container transition-colors duration-200 flex justify-center items-center gap-2 w-full active:scale-[0.98]" type="button">
                            预约咨询
                            <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-surface-container w-full border-t border-outline-variant mt-[120px]">
<div class="max-w-[1200px] mx-auto px-8 py-16 flex flex-col md:flex-row justify-between items-center gap-8">
<!-- Copyright & Brand -->
<div class="flex flex-col gap-2 items-center md:items-start text-center md:text-left">
<span class="font-headline-md text-headline-md text-primary font-bold">
                    智造专家
                </span>
<span class="font-body-md text-body-md text-on-surface-variant">
                    © 2024 工业制造软件专家. 保留所有权利。
                </span>
</div>
<!-- Footer Links -->
<div class="flex gap-6 items-center">
<a class="font-label-bold text-label-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors opacity-100 hover:opacity-80" href="#">
                    隐私政策
                </a>
<a class="font-label-bold text-label-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors opacity-100 hover:opacity-80" href="#">
                    服务条款
                </a>
<a class="font-label-bold text-label-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors opacity-100 hover:opacity-80" href="#">
                    粤ICP备12345678号
                </a>
</div>
</div>
</footer>
</body></html>
